name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'   # Triggers on tags like v1.0.0, v1.2.3

permissions:
  contents: write  # Required to create GitHub Releases and upload assets

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Package portable build
        env:
          PPMD_FLAVOR: portable
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --win portable --publish never "--config.directories.output=dist-portable"

      - name: Package installer build
        env:
          PPMD_FLAVOR: installer
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --win nsis --publish never "--config.directories.output=dist-installer"

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: PP-MD-portable
          path: dist-portable/*.exe
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PP-MD-installer
          path: dist-installer/*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-portable/*.exe
            dist-installer/*.exe
          generate_release_notes: true
