directories:
  output: release-temp-portable-20260428-085343
  buildResources: build
afterPack: scripts/electron-builder-after-pack.cjs
appId: com.ppmd.desktop
productName: PP-MD
asar: true
compression: maximum
copyright: Copyright (c) Mike Hartley, Hart of the Midlands
forceCodeSigning: false
extraMetadata:
  author: Mike Hartley
  companyName: Hart of the Midlands
files:
  - filter:
      - dist/**/*
      - electron/**/*
      - package.json
win:
  signAndEditExecutable: false
  executableName: PP-MD
  icon: build/icon.ico
  signtoolOptions:
    publisherName: Hart of the Midlands
  target:
    - portable
    - nsis
  artifactName: PP-MD-${version}-${arch}-${env.PPMD_FLAVOR}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
electronVersion: 32.3.3
